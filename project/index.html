<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>品牌官网</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ====== 导航栏 ====== -->
    <header>
        <nav class="navbar">
            <div class="logo">🌐 tvt41</div>
            <ul class="nav-menu">
                <li><a href="#" class="active">首页</a></li>
                <li><a href="#">关于</a></li>
                <li><a href="#">服务</a></li>
                <li><a href="#">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- ====== 轮播图 ====== -->
    <section class="carousel">
        <div class="carousel-container">
            <div class="carousel-slide active">
                <h2>欢迎来到我的品牌</h2>
                <p>专业 · 创新 · 值得信赖</p>
            </div>
            <div class="carousel-slide">
                <h2>优质服务</h2>
                <p>为客户创造最大价值</p>
            </div>
            <div class="carousel-slide">
                <h2>联系我们</h2>
                <p>期待与您合作</p>
            </div>
        </div>
        <div class="carousel-dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
        </div>
    </section>

    <!-- ====== 内容展示区 ====== -->
    <section class="services">
        <h2>我们的服务</h2>
        <div class="service-cards">
            <div class="card">
                <h3>Web开发</h3>
                <p>响应式网站设计与开发</p>
            </div>
            <div class="card">
                <h3>UI/UX设计</h3>
                <p>用户体验与界面设计</p>
            </div>
            <div class="card">
                <h3>技术咨询</h3>
                <p>专业的技术解决方案</p>
            </div>
        </div>
    </section>

    <!-- ====== 底部信息 ====== -->
    <footer>
        <p>&copy; 2026 tvt41. All rights reserved.</p>
    </footer>
